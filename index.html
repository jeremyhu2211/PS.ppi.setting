<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大圖輸出 / 印刷設定速查</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    background: #f5f4f0;
    color: #1a1a18;
    min-height: 100vh;
    padding: 2rem 1rem;
    line-height: 1.6;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 2rem;
  }

  header h1 {
    font-size: 22px;
    font-weight: 500;
    color: #1a1a18;
    margin-bottom: 4px;
  }

  header p {
    font-size: 14px;
    color: #6b6a63;
  }

  .sec { margin-bottom: 1.75rem; }

  .sec-title {
    font-size: 11px;
    font-weight: 500;
    color: #9c9a92;
    text-transform: uppercase;
    letter-spacing: .06em;
    margin-bottom: .65rem;
  }

  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 10px;
  }

  .pcard {
    background: #fff;
    border: 0.5px solid #d3d1c7;
    border-radius: 12px;
    padding: .85rem 1rem;
    cursor: pointer;
    transition: border-color .15s, background .15s;
    user-select: none;
  }

  .pcard:hover { border-color: #888780; }

  .pcard.active {
    background: #eeecea;
    border-color: #5f5e5a;
  }

  .pcard-label { font-size: 13px; font-weight: 500; margin-bottom: 2px; color: #1a1a18; }
  .pcard-sub { font-size: 12px; color: #6b6a63; }

  .result {
    background: #eeecea;
    border-radius: 12px;
    padding: 1rem 1.25rem;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 1.25rem;
  }

  .ritem { display: flex; flex-direction: column; gap: 3px; }
  .rlabel { font-size: 11px; color: #9c9a92; }
  .rval { font-size: 22px; font-weight: 500; color: #1a1a18; }
  .rsub { font-size: 11px; color: #6b6a63; }

  .tip-box {
    border-left: 2px solid #b4b2a9;
    padding: .5rem .75rem;
    margin-bottom: .65rem;
    font-size: 13px;
    color: #6b6a63;
    line-height: 1.65;
    background: #fff;
    border-radius: 0 8px 8px 0;
  }

  .tip-box strong { color: #1a1a18; font-weight: 500; }

  .tip-box.warn {
    border-left-color: #BA7517;
    background: #fdf6e8;
    color: #854F0B;
  }

  .tip-box.warn strong { color: #633806; }

  .divider {
    border: none;
    border-top: 0.5px solid #d3d1c7;
    margin: 1.5rem 0;
  }

  .calc-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: .75rem;
    flex-wrap: wrap;
  }

  .calc-row label {
    font-size: 13px;
    color: #6b6a63;
    min-width: 50px;
  }

  .calc-row input[type=number],
  .calc-row select {
    font-size: 13px;
    padding: 5px 9px;
    border: 0.5px solid #b4b2a9;
    border-radius: 8px;
    background: #fff;
    color: #1a1a18;
    outline: none;
    transition: border-color .15s;
  }

  .calc-row input[type=number] { width: 76px; }

  .calc-row input[type=number]:focus,
  .calc-row select:focus { border-color: #5f5e5a; }

  #calc-result {
    margin-top: .5rem;
    font-size: 13px;
    color: #6b6a63;
    line-height: 1.9;
    background: #fff;
    border: 0.5px solid #d3d1c7;
    border-radius: 10px;
    padding: .75rem 1rem;
  }

  #calc-result strong { color: #1a1a18; font-weight: 500; }

  .pill {
    display: inline-block;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 99px;
    margin-right: 4px;
  }

  .pill-ok  { background: #e5f2d8; color: #3B6D11; }
  .pill-warn { background: #fdf0d5; color: #854F0B; }
  .pill-bad  { background: #fce8e8; color: #A32D2D; }

  .warn-text { color: #854F0B; }

  footer {
    margin-top: 2.5rem;
    font-size: 12px;
    color: #9c9a92;
    text-align: center;
  }

  @media (max-width: 480px) {
    .result { grid-template-columns: 1fr 1fr; }
    .card-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>大圖輸出 / 印刷設定速查</h1>
    <p>依輸出類型查詢建議解析度、色彩模式與格式，並計算實際檔案大小</p>
  </header>

  <div class="sec">
    <div class="sec-title">選擇輸出類型</div>
    <div class="card-grid" id="type-grid">
      <div class="pcard active" data-type="offset" onclick="selectType(this)">
        <div class="pcard-label">一般印刷</div>
        <div class="pcard-sub">傳單、DM、名片</div>
      </div>
      <div class="pcard" data-type="large" onclick="selectType(this)">
        <div class="pcard-label">大圖輸出</div>
        <div class="pcard-sub">海報、帆布、X架</div>
      </div>

    </div>
  </div>

  <div class="result" id="result-box">
    <div class="ritem">
      <span class="rlabel">建議 DPI</span>
      <span class="rval" id="r-dpi">300</span>
      <span class="rsub" id="r-dpi-sub">最低可接受 250</span>
    </div>
    <div class="ritem">
      <span class="rlabel">色彩模式</span>
      <span class="rval" id="r-color">CMYK</span>
      <span class="rsub" id="r-color-sub">印刷標準</span>
    </div>
    <div class="ritem">
      <span class="rlabel">儲存格式</span>
      <span class="rval" id="r-format">EPS</span>
      <span class="rsub" id="r-format-sub">或 PDF/X-1a</span>
    </div>
  </div>

  <div id="tips-area"></div>

  <hr class="divider">

  <div class="sec">
    <div class="sec-title">計算實際像素數 &amp; 檔案大小</div>
    <div class="calc-row">
      <label>寬度</label>
      <input type="number" id="w" value="29.7" min="1" max="10000" oninput="calc()">
      <label>高度</label>
      <input type="number" id="h" value="21" min="1" max="10000" oninput="calc()">
      <select id="unit" onchange="calc()">
        <option value="cm">cm</option>
        <option value="mm">mm</option>
        <option value="in">inch</option>
      </select>
    </div>
    <div class="calc-row">
      <label>DPI</label>
      <input type="number" id="dpi" value="300" min="72" max="600" oninput="calc()">
      <label>圖層</label>
      <select id="channels" onchange="calc()">
        <option value="3">RGB (3ch)</option>
        <option value="4" selected>CMYK (4ch)</option>
      </select>
    </div>
    <div id="calc-result"></div>
  </div>

  <footer>Photoshop 印刷設定參考指南</footer>

</div>

<script>
const data = {
  offset: {
    dpi: 300, minDpi: 250, color: 'CMYK', colorSub: '印刷標準', format: 'TIF', formatSub: '或 PDF/X-1a',
    tips: [
      { type: 'normal', text: '<strong>300 DPI</strong> 是傳單、DM、名片、書刊的業界標準，觀看距離約 20–40 cm。' },
      { type: 'normal', text: '線條稿（Logo、字體輪廓）建議用 <strong>向量檔（AI / EPS）</strong>，不受 DPI 限制。' },
      { type: 'warn',   text: '<strong>超過 300 DPI 並不會讓印刷更清晰</strong>——印刷機的網點解析度（LPI）通常是 150，300 DPI 已是 2× 倍數，再高只是浪費儲存空間。' },
    ]
  },
  large: {
    dpi: 600, minDpi: 72, color: 'CMYK', colorSub: '印刷標準', format: 'TIF', formatSub: '或高解析 PDF',
    tips: [
      { type: 'normal', text: '建議以 <strong>1/10 實際尺寸</strong>開檔，解析度設定 <strong>600 DPI</strong> 製作，輸出時告知印刷廠放大 10 倍。' },
      { type: 'normal', text: '例如實際輸出為 300×100 cm，開檔尺寸設為 30×10 cm、600 DPI 即可，效果相同且檔案大小可控。' },
      { type: 'warn',   text: '若素材全是向量（Illustrator 繪製），可直接輸出向量 PDF，完全不受 DPI 限制。' },
    ]
  },
};

let currentType = 'offset';

function selectType(el) {
  document.querySelectorAll('.pcard').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  currentType = el.dataset.type;
  render();
  calc();
}

function render() {
  const d = data[currentType];
  document.getElementById('r-dpi').textContent = d.dpi;
  document.getElementById('r-dpi-sub').textContent = '最低可接受 ' + d.minDpi;
  document.getElementById('r-color').textContent = d.color;
  document.getElementById('r-color-sub').textContent = d.colorSub;
  document.getElementById('r-format').textContent = d.format;
  document.getElementById('r-format-sub').textContent = d.formatSub;

  document.getElementById('tips-area').innerHTML = d.tips.map(t =>
    `<div class="tip-box ${t.type === 'warn' ? 'warn' : ''}">${t.text}</div>`
  ).join('');

  document.getElementById('dpi').value = d.dpi;
}

function calc() {
  const wVal = parseFloat(document.getElementById('w').value) || 0;
  const hVal = parseFloat(document.getElementById('h').value) || 0;
  const dpi  = parseFloat(document.getElementById('dpi').value) || 300;
  const unit = document.getElementById('unit').value;
  const ch   = parseInt(document.getElementById('channels').value);

  const toInch = { cm: 1/2.54, mm: 1/25.4, in: 1 }[unit];
  const pw = Math.round(wVal * toInch * dpi);
  const ph = Math.round(hVal * toInch * dpi);
  const mb = (pw * ph * ch) / 1024 / 1024;

  let sizeStr, sizeClass;
  if (mb < 50)       { sizeStr = 'small';  sizeClass = 'pill-ok'; }
  else if (mb < 200) { sizeStr = 'medium'; sizeClass = 'pill-warn'; }
  else               { sizeStr = 'large';  sizeClass = 'pill-bad'; }

  let advice = '';
  if (mb > 200) advice = '⟶ 檔案偏大，考慮降低 DPI 或改用向量格式';
  if (mb > 500) advice = '⟶ 非常大！會嚴重拖慢 PS，建議降低 DPI 或縮小尺寸';

  document.getElementById('calc-result').innerHTML =
    `像素尺寸：<strong>${pw.toLocaleString()} × ${ph.toLocaleString()} px</strong>　` +
    `總像素：<strong>${(pw * ph / 1000000).toFixed(1)} MP</strong><br>` +
    `未壓縮大小：<strong>${mb.toFixed(0)} MB</strong>　` +
    `<span class="pill ${sizeClass}">${sizeStr}</span>` +
    (advice ? `<br><span class="warn-text">${advice}</span>` : '');
}

render();
calc();
</script>
</body>
</html>
